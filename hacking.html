<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Victoria Przydanek — Hacking</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true"></div>
          <div class="brand__text">
            <div class="brand__name">Victoria Przydanek</div>
            <div class="brand__tag">Personal site</div>
          </div>
        </div>

        <nav class="nav" aria-label="Primary">
          <a class="nav__link" href="./index.html">Home</a>
          <a class="nav__link" href="./research.html">Research</a>
          <a class="nav__link is-active" href="./hacking.html">Hacking</a>
          <a class="nav__link" href="./press.html">Press</a>
          <a class="nav__link" href="./side-quests.html">Side-Quests</a>
        </nav>
      </div>
    </header>

    <main id="main" class="app">
      <section class="page is-active">
        <div class="page__header">
          <h1 class="h1">Hacking</h1>
          <p class="lede">A post-it wall of projects. Click a note to pop it out.</p>
        </div>

        <div id="hackingWall" class="wall" aria-label="Project post-it wall"></div>
      </section>
    </main>

    <dialog class="modal" id="projectModal" aria-label="Project details">
      <form method="dialog" class="modal__surface">
        <div class="modal__top">
          <div>
            <div class="modal__title" id="modalTitle">Project</div>
            <div class="modal__chips" id="modalChips"></div>
          </div>
          <button class="icon-btn" value="cancel" aria-label="Close">✕</button>
        </div>

        <div class="modal__body">
          <div class="modal__grid">
            <div class="modal__media" id="modalMedia"></div>
            <div class="modal__text">
              <div class="modal__desc" id="modalDesc"></div>
              <div class="modal__links" id="modalLinks"></div>
            </div>
          </div>
        </div>
      </form>
    </dialog>

    <footer class="footer">
      <div class="footer__inner">
        <span>© <span id="year"></span> Victoria Przydanek</span>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
